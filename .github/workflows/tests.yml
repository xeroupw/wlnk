name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: build wlnk
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: setup msvc environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: run tests
        shell: pwsh
        run: |
          $wlnk = "target\x86_64-pc-windows-msvc\release\wlnk.exe"
          $tests_dir = ".github\tests"
          $passed = 0
          $failed = 0
          $errors = @()
          $lib_dirs = $env:LIB -split ';' | Where-Object { $_ -ne '' }
          $lib_args = $lib_dirs | ForEach-Object { "--lib"; $_ }

          function Run-Test {
            param($name, $obj_files, $expected_file, $exe_file)

            Write-Host "--- $name wlnk call ---"
            & "$wlnk" @obj_files -o "$exe_file" --subsystem console --entry main @lib_args
            if ($LASTEXITCODE -ne 0) { return "wlnk exited $LASTEXITCODE" }

            $proc = Start-Process -FilePath "$exe_file" -PassThru `
              -RedirectStandardOutput "$env:TEMP\$name.stdout" -NoNewWindow
            $exited = $proc.WaitForExit(5000)
            if (-not $exited) {
              $proc.Kill()
              return "exe timed out after 5s"
            }

            $actual_raw = Get-Content "$env:TEMP\$name.stdout" -Raw
            $actual_raw = if ($null -eq $actual_raw) { "" } else { $actual_raw }
            $expected_raw = Get-Content $expected_file -Raw
            $expected_raw = if ($null -eq $expected_raw) { "" } else { $expected_raw }

            $actual_norm = $actual_raw.Trim().Replace("`r`n", "`n")
            $expected_norm = $expected_raw.Trim().Replace("`r`n", "`n")

            if ($actual_norm -ne $expected_norm) {
              return "expected: $expected_norm`n  actual: $actual_norm"
            }
            return $null
          }

          # single .c file tests
          foreach ($test in Get-ChildItem -Path $tests_dir -Filter "*.c") {
            $name = $test.BaseName
            $expected_file = Join-Path $tests_dir "$name.expected"
            $obj_file = Join-Path $env:TEMP "$name.obj"
            $exe_file = Join-Path $env:TEMP "$name.exe"

            if (-not (Test-Path $expected_file)) {
              Write-Host "SKIP $name (no .expected file)"
              continue
            }

            $cl_out = cl.exe /nologo /c /O2 /GS- $test.FullName /Fo"$obj_file" 2>&1
            if ($LASTEXITCODE -ne 0) {
              $failed++
              $errors += "FAIL $name : cl.exe failed:`n$cl_out"
              continue
            }

            $err = Run-Test $name @($obj_file) $expected_file $exe_file
            if ($null -eq $err) { $passed++; Write-Host "PASS $name" }
            else { $failed++; $errors += "FAIL $name : $err" }
          }

          # multi-obj tests: each subdirectory with an expected file
          foreach ($dir in Get-ChildItem -Path $tests_dir -Directory) {
            $name = $dir.Name
            $expected_file = Join-Path $dir.FullName "expected"

            if (-not (Test-Path $expected_file)) {
              Write-Host "SKIP $name (no expected file)"
              continue
            }

            $sources = Get-ChildItem -Path $dir.FullName -Filter "*.c"
            if ($sources.Count -eq 0) {
              Write-Host "SKIP $name (no .c files)"
              continue
            }

            $obj_files = @()
            $compile_ok = $true
            foreach ($src in $sources) {
              $obj = Join-Path $env:TEMP "$name-$($src.BaseName).obj"
              $cl_out = cl.exe /nologo /c /O2 /GS- $src.FullName /Fo"$obj" 2>&1
              if ($LASTEXITCODE -ne 0) {
                $failed++
                $errors += "FAIL $name : cl.exe failed on $($src.Name):`n$cl_out"
                $compile_ok = $false
                break
              }
              $obj_files += $obj
            }
            if (-not $compile_ok) { continue }

            $exe_file = Join-Path $env:TEMP "$name.exe"
            $err = Run-Test $name $obj_files $expected_file $exe_file
            if ($null -eq $err) { $passed++; Write-Host "PASS $name" }
            else { $failed++; $errors += "FAIL $name : $err" }
          }

          Write-Host ""
          Write-Host "results: $passed passed, $failed failed"

          if ($errors.Count -gt 0) {
            Write-Host ""
            foreach ($e in $errors) { Write-Host $e }
            exit 1
          }
