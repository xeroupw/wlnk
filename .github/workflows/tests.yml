name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: build wlnk
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: setup msvc environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: run tests
        shell: pwsh
        run: |
          $wlnk = "target\x86_64-pc-windows-msvc\release\wlnk.exe"
          $tests_dir = ".github\tests"
          $passed = 0
          $failed = 0
          $errors = @()
          $lib_dirs = $env:LIB -split ';' | Where-Object { $_ -ne '' }
          $lib_args = $lib_dirs | ForEach-Object { "--lib"; $_ }

          # compiles a single .c file to .obj, returns $false on failure
          function Compile-C {
            param($src, $obj)
            $out = cl.exe /nologo /c /O2 /GS- "$src" /Fo"$obj" 2>&1
            if ($LASTEXITCODE -ne 0) {
              Write-Host "  cl.exe failed: $out"
              return $false
            }
            return $true
          }

          # links objs, runs exe, compares stdout to expected
          # writes result directly to outer $passed/$failed/$errors via script scope
          function Run-Test {
            param($name, [string[]]$obj_files, $expected_file, $exe_file)

            Write-Host "--- $name wlnk call ---"
            # redirect wlnk stdout to host directly, not captured
            & "$wlnk" @obj_files -o "$exe_file" --subsystem console --entry main @lib_args
            if ($LASTEXITCODE -ne 0) {
              $script:failed++
              $script:errors += "FAIL $name : wlnk exited $LASTEXITCODE"
              return
            }

            $stdout_file = "$env:TEMP\$name.stdout"
            $proc = Start-Process `
              -FilePath "$exe_file" `
              -RedirectStandardOutput "$stdout_file" `
              -NoNewWindow `
              -PassThru
            $exited = $proc.WaitForExit(5000)
            if (-not $exited) {
              $proc.Kill()
              $script:failed++
              $script:errors += "FAIL $name : exe timed out after 5s"
              return
            }

            $actual_raw = if (Test-Path $stdout_file) { Get-Content $stdout_file -Raw } else { "" }
            $actual_raw = if ($null -eq $actual_raw) { "" } else { $actual_raw }
            $expected_raw = Get-Content $expected_file -Raw
            $expected_raw = if ($null -eq $expected_raw) { "" } else { $expected_raw }

            $actual_norm = $actual_raw.Trim().Replace("`r`n", "`n")
            $expected_norm = $expected_raw.Trim().Replace("`r`n", "`n")

            if ($actual_norm -eq $expected_norm) {
              $script:passed++
              Write-Host "PASS $name"
            } else {
              $script:failed++
              $script:errors += "FAIL $name`n  expected: $expected_norm`n  actual: $actual_norm"
            }
          }

          # single .c file tests
          foreach ($test in Get-ChildItem -Path $tests_dir -Filter "*.c") {
            $name = $test.BaseName
            $expected_file = Join-Path $tests_dir "$name.expected"
            $obj_file = Join-Path $env:TEMP "$name.obj"
            $exe_file = Join-Path $env:TEMP "$name.exe"

            if (-not (Test-Path $expected_file)) {
              Write-Host "SKIP $name (no .expected file)"
              continue
            }

            Write-Host "--- $name compile ---"
            if (-not (Compile-C $test.FullName $obj_file)) {
              $failed++
              $errors += "FAIL $name : compile failed"
              continue
            }

            Run-Test $name @($obj_file) $expected_file $exe_file
          }

          # multi-obj tests: subdirectories containing .c files and an expected file
          foreach ($dir in Get-ChildItem -Path $tests_dir -Directory) {
            $name = $dir.Name
            $expected_file = Join-Path $dir.FullName "expected"

            if (-not (Test-Path $expected_file)) {
              Write-Host "SKIP $name (no expected file)"
              continue
            }

            $sources = Get-ChildItem -Path $dir.FullName -Filter "*.c"
            if ($sources.Count -eq 0) {
              Write-Host "SKIP $name (no .c files)"
              continue
            }

            $obj_files = [System.Collections.Generic.List[string]]::new()
            $compile_ok = $true
            foreach ($src in $sources) {
              $obj = Join-Path $env:TEMP "$name-$($src.BaseName).obj"
              Write-Host "--- $name compile $($src.Name) ---"
              if (-not (Compile-C $src.FullName $obj)) {
                $failed++
                $errors += "FAIL $name : compile failed on $($src.Name)"
                $compile_ok = $false
                break
              }
              $obj_files.Add($obj)
            }
            if (-not $compile_ok) { continue }

            $exe_file = Join-Path $env:TEMP "$name.exe"
            Run-Test $name $obj_files.ToArray() $expected_file $exe_file
          }

          Write-Host ""
          Write-Host "results: $passed passed, $failed failed"

          if ($errors.Count -gt 0) {
            Write-Host ""
            foreach ($e in $errors) { Write-Host $e }
            exit 1
          }
